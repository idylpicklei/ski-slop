name: Deploy Ski Slop

# Disable this workflow if you deploy via Cloudflare Workers Builds (dashboard).
# You only need ONE deploy pipeline — not both GHA and Workers Builds on push.

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/.assetsignore || (echo "::error::dist/.assetsignore missing — build step failed" && exit 1)
          test -f dist/_worker.js/index.js || (echo "::error::dist/_worker.js/index.js missing — functions build failed" && exit 1)

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/ci-deploy.mjs
